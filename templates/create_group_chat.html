{% extends "base.html" %}

{% block title %}Создать групповой чат - Kildear{% endblock %}

{% block content %}
<div class="create-group-container">
    <div class="create-group-card">
        <h1><i class="fas fa-users"></i> Создать групповой чат</h1>

        <form method="POST" id="createGroupForm" enctype="multipart/form-data">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div class="form-group">
                <label for="name"><i class="fas fa-tag"></i> Название чата *</label>
                <input type="text" id="name" name="name" required
                       placeholder="Введите название группового чата"
                       maxlength="100" autocomplete="off">
                <div class="char-counter"><span id="name-counter">0</span>/100</div>
            </div>

            <div class="form-group">
                <label for="description"><i class="fas fa-align-left"></i> Описание</label>
                <textarea id="description" name="description"
                          placeholder="Опишите, для чего этот чат..."
                          maxlength="500" rows="4"></textarea>
                <div class="char-counter"><span id="desc-counter">0</span>/500</div>
            </div>

            <div class="form-group">
                <label for="avatar"><i class="fas fa-image"></i> Аватар чата</label>
                <div class="avatar-upload" id="avatar-drop">
                    <div class="avatar-preview" id="avatar-preview">
                        <i class="fas fa-cloud-upload-alt"></i>
                        <p>Нажмите или перетащите изображение</p>
                        <p class="hint">PNG, JPG, GIF до 5MB</p>
                    </div>
                    <input type="file" id="avatar" name="avatar" accept="image/*" style="display: none;">
                </div>
            </div>

            <div class="form-group checkbox-group">
                <label class="checkbox-label">
                    <input type="checkbox" name="is_private" id="is_private">
                    <span class="checkbox-custom"></span>
                    <span class="checkbox-text">
                        <i class="fas fa-lock"></i> Приватный чат
                        <small>Только по приглашениям</small>
                    </span>
                </label>
            </div>

            <div class="form-actions">
                <button type="button" class="btn btn-secondary" onclick="history.back()">
                    <i class="fas fa-times"></i> Отмена
                </button>
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-plus"></i> Создать чат
                </button>
            </div>
        </form>
    </div>
</div>

<style>
.create-group-container {
    max-width: 600px;
    margin: 40px auto;
    padding: 20px;
}

.create-group-card {
    background: var(--card-bg);
    border-radius: 16px;
    padding: 30px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
}

.create-group-card h1 {
    margin: 0 0 30px 0;
    font-size: 28px;
    color: var(--text-primary);
    text-align: center;
}

.form-group {
    margin-bottom: 25px;
}

.form-group label {
    display: block;
    margin-bottom: 8px;
    font-weight: 500;
    color: var(--text-primary);
}

.form-group label i {
    margin-right: 8px;
    color: var(--primary);
}

.form-group input,
.form-group textarea {
    width: 100%;
    padding: 12px;
    border: 2px solid var(--border);
    border-radius: 8px;
    background: var(--input-bg);
    color: var(--text-primary);
    font-size: 14px;
    transition: all 0.3s;
}

.form-group input:focus,
.form-group textarea:focus {
    outline: none;
    border-color: var(--primary);
}

.form-group textarea {
    resize: vertical;
    font-family: inherit;
}

.char-counter {
    text-align: right;
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 5px;
}

.avatar-upload {
    border: 2px dashed var(--border);
    border-radius: 12px;
    padding: 30px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s;
    background: var(--input-bg);
}

.avatar-upload:hover {
    border-color: var(--primary);
    background: var(--hover-bg);
}

.avatar-upload.drag-over {
    border-color: var(--primary);
    background: var(--primary-light);
}

.avatar-preview i {
    font-size: 48px;
    color: var(--text-dim);
    margin-bottom: 10px;
}

.avatar-preview p {
    margin: 5px 0;
    color: var(--text-secondary);
}

.avatar-preview .hint {
    font-size: 12px;
    color: var(--text-dim);
}

.avatar-preview img {
    max-width: 150px;
    max-height: 150px;
    border-radius: 50%;
    margin: 10px auto;
}

.checkbox-group {
    margin: 20px 0;
}

.checkbox-label {
    display: flex;
    align-items: flex-start;
    cursor: pointer;
    user-select: none;
}

.checkbox-custom {
    width: 20px;
    height: 20px;
    border: 2px solid var(--border);
    border-radius: 4px;
    margin-right: 12px;
    position: relative;
    flex-shrink: 0;
    transition: all 0.2s;
}

.checkbox-label input:checked + .checkbox-custom {
    background: var(--primary);
    border-color: var(--primary);
}

.checkbox-label input:checked + .checkbox-custom::after {
    content: '✓';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: white;
    font-size: 12px;
}

.checkbox-text {
    flex: 1;
}

.checkbox-text i {
    margin-right: 8px;
    color: var(--warning);
}

.checkbox-text small {
    display: block;
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 4px;
}

.form-actions {
    display: flex;
    gap: 15px;
    justify-content: flex-end;
    margin-top: 30px;
}

.btn {
    padding: 12px 24px;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.3s;
    display: inline-flex;
    align-items: center;
    gap: 8px;
}

.btn-primary {
    background: var(--primary);
    color: white;
}

.btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(108,99,255,0.3);
}

.btn-secondary {
    background: var(--secondary-bg);
    color: var(--text-primary);
}

.btn-secondary:hover {
    background: var(--hover-bg);
}

@media (max-width: 768px) {
    .create-group-container {
        margin: 20px auto;
        padding: 10px;
    }

    .create-group-card {
        padding: 20px;
    }

    .form-actions {
        flex-direction: column;
    }

    .btn {
        justify-content: center;
    }
}
</style>
