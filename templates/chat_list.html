{% extends "base.html" %}

{% block title %}Messages — Kildear{% endblock %}

{% block head %}
<style>
  .messages-container {
    max-width: 1000px;
    margin: 0 auto;
    padding: 20px;
  }

  .messages-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
  }

  .messages-header h1 {
    font-size: 1.8rem;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .new-msg-btn {
    background: var(--primary);
    color: white;
    border: none;
    padding: 12px 24px;
    border-radius: 30px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: transform 0.2s;
  }

  .new-msg-btn:hover {
    transform: scale(1.02);
  }

  .conv-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
  }

  .conv-search {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
  }

  .conv-search input {
    width: 100%;
    padding: 12px 16px;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 30px;
    color: var(--text);
    font-size: 0.9rem;
  }

  .conv-search input:focus {
    outline: none;
    border-color: var(--primary);
  }

  .conv-list {
    max-height: calc(100vh - 250px);
    overflow-y: auto;
  }

  .conv-item {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 16px 20px;
    text-decoration: none;
    transition: background 0.2s;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
  }

  .conv-item:hover {
    background: rgba(255,255,255,0.03);
  }

  .conv-avatar {
    position: relative;
    flex-shrink: 0;
  }

  .conv-avatar img {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    object-fit: cover;
  }

  .online-dot {
    position: absolute;
    bottom: 2px;
    right: 2px;
    width: 12px;
    height: 12px;
    background: #4ade80;
    border-radius: 50%;
    border: 2px solid var(--card);
  }

  .conv-info {
    flex: 1;
    min-width: 0;
  }

  .conv-top {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 6px;
  }

  .conv-name {
    font-weight: 700;
    font-size: 1rem;
    display: flex;
    align-items: center;
    gap: 6px;
    color: var(--text);
  }

  .conv-time {
    font-size: 0.7rem;
    color: var(--text-muted);
  }

  .conv-preview {
    font-size: 0.85rem;
    color: var(--text-muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .conv-preview i {
    margin-right: 4px;
  }

  .unread-badge {
    background: var(--primary);
    color: white;
    font-size: 0.7rem;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 20px;
    min-width: 24px;
    text-align: center;
  }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
  }

  .empty-icon {
    font-size: 4rem;
    margin-bottom: 16px;
    opacity: 0.5;
  }

  .empty-state h3 {
    margin-bottom: 8px;
  }

  .empty-state p {
    color: var(--text-muted);
    margin-bottom: 24px;
  }

  /* Modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(5px);
  }

  .modal-overlay.hidden {
    display: none;
  }

  .modal-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    width: 480px;
    max-width: 95vw;
    max-height: 90vh;
    overflow-y: auto;
  }

  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
  }

  .modal-header h3 {
    font-size: 1.2rem;
    font-weight: 600;
  }

  .modal-close {
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 1.2rem;
    cursor: pointer;
    padding: 8px;
    border-radius: 50%;
  }

  .modal-close:hover {
    background: rgba(255,255,255,0.1);
  }

  .modal-body {
    padding: 24px;
  }

  .search-input-wrapper {
    position: relative;
    margin-bottom: 20px;
  }

  .search-icon {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
  }

  .user-search-input {
    width: 100%;
    padding: 14px 16px 14px 42px;
    background: rgba(255,255,255,0.05);
    border: 2px solid var(--border);
    border-radius: 40px;
    color: var(--text);
    font-size: 1rem;
  }

  .user-search-input:focus {
    outline: none;
    border-color: var(--primary);
  }

  .search-results {
    max-height: 400px;
    overflow-y: auto;
  }

  .search-result-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px;
    cursor: pointer;
    border-radius: 12px;
    transition: background 0.2s;
  }

  .search-result-item:hover {
    background: rgba(255,255,255,0.05);
  }

  .search-result-avatar img {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    object-fit: cover;
  }

  .search-result-info {
    flex: 1;
  }

  .search-result-name {
    font-weight: 600;
    margin-bottom: 4px;
  }

  .search-result-username {
    font-size: 0.8rem;
    color: var(--text-muted);
  }

  .search-hint {
    text-align: center;
    padding: 40px;
    color: var(--text-muted);
  }

  .loading {
    text-align: center;
    padding: 40px;
    color: var(--text-muted);
  }
</style>
{% endblock %}

{% block content %}
<div class="messages-container">
  <div class="messages-header">
    <h1>
      <i class="fa-regular fa-comments"></i>
      Messages
    </h1>
    <button class="new-msg-btn" onclick="openNewMessageModal()">
      <i class="fa-solid fa-plus"></i>
      New message
    </button>
  </div>

  <div class="conv-card">
    <div class="conv-search">
      <input type="text" id="searchInput" placeholder="Search conversations..." onkeyup="filterConversations()">
    </div>
    <div class="conv-list" id="conversationsList">
      <div class="loading">
        <i class="fa-solid fa-spinner fa-spin"></i>
        <p>Loading conversations...</p>
      </div>
    </div>
  </div>
</div>

<!-- New Message Modal -->
<div class="modal-overlay hidden" id="newMessageModal">
  <div class="modal-card">
    <div class="modal-header">
      <h3><i class="fa-regular fa-pen-to-square"></i> New message</h3>
      <button class="modal-close" onclick="closeNewMessageModal()">
        <i class="fa-solid fa-times"></i>
      </button>
    </div>
    <div class="modal-body">
      <div class="search-input-wrapper">
        <i class="fa-solid fa-magnifying-glass search-icon"></i>
        <input type="text" class="user-search-input" id="userSearch" placeholder="Search by username..." oninput="searchUsers(this.value)" autofocus>
      </div>
      <div class="search-results" id="searchResults">
        <div class="search-hint">
          <i class="fa-regular fa-user"></i>
          <p>Type a username to start searching</p>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
let searchTimeout;

// Load conversations on page load
document.addEventListener('DOMContentLoaded', function() {
  loadConversations();

  // Poll for new messages every 5 seconds
  setInterval(loadConversations, 5000);
});

async function loadConversations() {
  try {
    const response = await fetch('/api/conversations');
    const data = await response.json();

    const container = document.getElementById('conversationsList');

    if (!data.conversations || data.conversations.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">💬</div>
          <h3>No messages yet</h3>
          <p>Start a conversation with someone!</p>
          <button class="btn btn-primary" onclick="openNewMessageModal()">Send first message</button>
        </div>
      `;
      return;
    }

    container.innerHTML = data.conversations.map(conv => `
      <div class="conv-item" onclick="location.href='/chat/${conv.username}'" data-name="${conv.display_name.toLowerCase()} ${conv.username.toLowerCase()}">
        <div class="conv-avatar">
          <img src="${conv.avatar || '/static/default_avatar.png'}" alt="${conv.display_name}" onerror="this.src='/static/default_avatar.png'">
          ${conv.is_online ? '<span class="online-dot"></span>' : ''}
        </div>
        <div class="conv-info">
          <div class="conv-top">
            <div class="conv-name">
              ${escapeHtml(conv.display_name)}
              ${conv.is_verified ? '<i class="fa-solid fa-circle-check" style="color: var(--primary); font-size: 0.8rem;"></i>' : ''}
            </div>
            ${conv.last_message ? `<div class="conv-time">${conv.last_message.time || ''}</div>` : ''}
          </div>
          <div class="conv-preview">
            ${conv.last_message ? `
              ${conv.last_message.is_own ? '<i class="fa-regular fa-check"></i> You: ' : ''}
              ${conv.last_message.content || '📷 Photo'}
            ` : '<i class="fa-regular fa-circle"></i> No messages yet'}
          </div>
        </div>
        ${conv.unread_count > 0 ? `<div class="unread-badge">${conv.unread_count > 9 ? '9+' : conv.unread_count}</div>` : ''}
      </div>
    `).join('');
  } catch (error) {
    console.error('Error loading conversations:', error);
    document.getElementById('conversationsList').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">⚠️</div>
        <h3>Error loading messages</h3>
        <p>Please refresh the page</p>
      </div>
    `;
  }
}

function filterConversations() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const items = document.querySelectorAll('.conv-item');

  items.forEach(item => {
    const name = item.getAttribute('data-name') || '';
    item.style.display = name.includes(search) ? 'flex' : 'none';
  });
}

// New Message Modal
function openNewMessageModal() {
  const modal = document.getElementById('newMessageModal');
  modal.classList.remove('hidden');
  document.body.style.overflow = 'hidden';
  document.getElementById('userSearch').value = '';
  document.getElementById('userSearch').focus();
  document.getElementById('searchResults').innerHTML = `
    <div class="search-hint">
      <i class="fa-regular fa-user"></i>
      <p>Type a username to start searching</p>
    </div>
  `;
}

function closeNewMessageModal() {
  const modal = document.getElementById('newMessageModal');
  modal.classList.add('hidden');
  document.body.style.overflow = '';
}

async function searchUsers(query) {
  clearTimeout(searchTimeout);

  const resultsContainer = document.getElementById('searchResults');

  if (!query || query.length < 2) {
    resultsContainer.innerHTML = `
      <div class="search-hint">
        <i class="fa-regular fa-keyboard"></i>
        <p>Type at least 2 characters to search</p>
      </div>
    `;
    return;
  }

  resultsContainer.innerHTML = `
    <div class="loading">
      <i class="fa-solid fa-spinner fa-spin"></i>
      <p>Searching...</p>
    </div>
  `;

  searchTimeout = setTimeout(async () => {
    try {
      const response = await fetch(`/search?q=${encodeURIComponent(query)}&ajax=1`, {
        headers: { 'X-Requested-With': 'XMLHttpRequest' }
      });

      const data = await response.json();

      if (data.users && data.users.length > 0) {
        const currentUsername = '{{ current_user.username }}';
        const filteredUsers = data.users.filter(u => u.username !== currentUsername);

        if (filteredUsers.length > 0) {
          resultsContainer.innerHTML = filteredUsers.map(user => `
            <div class="search-result-item" onclick="startChat('${user.username}')">
              <div class="search-result-avatar">
                <img src="${user.avatar || '/static/default_avatar.png'}" alt="${user.username}" onerror="this.src='/static/default_avatar.png'">
              </div>
              <div class="search-result-info">
                <div class="search-result-name">${escapeHtml(user.display_name || user.username)}</div>
                <div class="search-result-username">@${escapeHtml(user.username)}</div>
              </div>
              <i class="fa-solid fa-chevron-right" style="color: var(--text-muted);"></i>
            </div>
          `).join('');
        } else {
          resultsContainer.innerHTML = `
            <div class="search-hint">
              <i class="fa-regular fa-user-slash"></i>
              <p>No other users found</p>
            </div>
          `;
        }
      } else {
        resultsContainer.innerHTML = `
          <div class="search-hint">
            <i class="fa-regular fa-user-slash"></i>
            <p>No users found matching "${escapeHtml(query)}"</p>
          </div>
        `;
      }
    } catch (error) {
      console.error('Search error:', error);
      resultsContainer.innerHTML = `
        <div class="search-hint">
          <i class="fa-regular fa-circle-exclamation"></i>
          <p>Error searching users. Please try again.</p>
        </div>
      `;
    }
  }, 500);
}

function startChat(username) {
  window.location.href = `/chat/${username}`;
}

function escapeHtml(text) {
  if (!text) return '';
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// Close modal on escape
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    closeNewMessageModal();
  }
});

// Close modal on overlay click
document.getElementById('newMessageModal').addEventListener('click', function(e) {
  if (e.target === this) {
    closeNewMessageModal();
  }
});
</script>
{% endblock %}
